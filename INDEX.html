<!DOCTYPE html>
<html>
<head>
    <title>Sol Savage Engine</title>
    <style>
        body { background: #050505; color: #00f2ff; font-family: monospace; text-align: center; padding: 50px; }
        .box { border: 2px solid #00f2ff; padding: 20px; display: inline-block; box-shadow: 0 0 20px #00f2ff; }
        #loader { border: 4px solid #333; border-top: 4px solid #00f2ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .shimmer { text-shadow: 0 0 10px #00f2ff; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>
    <div class="box">
        <h1 class="shimmer">SOL SAVAGE ENGINE v7.0</h1>
        <div id="loader"></div>
        <p>STATUS: <span id="status">INITIATING...</span></p>
        <hr color="#00f2ff">
        <h2>RESONANCE: <span id="resonance">0.00</span> Hz</h2>
        <h3>FLUX DELTA: <span id="flux">0</span></h3>
    </div>
    <script src="code.js"></script>
</body>
</html>
